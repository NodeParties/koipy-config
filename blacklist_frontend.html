<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koipy 回调管理</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #5cb85c;
            --danger-color: #d9534f;
            --warning-color: #f0ad4e;
            --dark-color: #292b2c;
            --light-color: #f7f7f7;
            --border-color: #ddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .logout-btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #c9302c;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--dark-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        .btn-success {
            background-color: var(--success-color);
        }

        .btn-success:hover {
            background-color: #449d44;
        }

        .btn-danger {
            background-color: var(--danger-color);
        }

        .btn-danger:hover {
            background-color: #c9302c;
        }

        .btn-warning {
            background-color: var(--warning-color);
        }

        .btn-warning:hover {
            background-color: #ec971f;
        }

        .blacklist-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .blacklist-table th, .blacklist-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .blacklist-table th {
            background-color: var(--light-color);
            font-weight: 600;
        }

        .blacklist-table tr:hover {
            background-color: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            padding: 6px 12px;
            font-size: 14px;
        }

        .notification {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .notification.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .notification.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .search-box {
            margin-bottom: 20px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--dark-color);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-col {
            flex: 1;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #6c757d;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .card {
                padding: 15px;
            }

            .blacklist-table {
                font-size: 14px;
            }

            .blacklist-table th, .blacklist-table td {
                padding: 8px 10px;
            }

            .action-buttons {
                flex-direction: column;
            }
            
            .form-row {
                flex-direction: column;
                gap: 10px;
            }
            
            header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Koipy 黑名单管理系统</h1>
                <p class="subtitle">管理 Telegram 用户黑名单，防止恶意使用</p>
            </div>
            <button class="logout-btn" id="logout-btn">登出</button>
        </header>

        <div class="notification" id="notification"></div>

        <div class="card">
            <h2 class="card-title">黑名单管理</h2>
            
            <div class="section">
                <h3 class="section-title">添加黑名单</h3>
                <div class="form-row">
                    <div class="form-col">
                        <form id="username-form">
                            <div class="form-group">
                                <label for="username">用户名:</label>
                                <input type="text" id="username" name="username" placeholder="输入用户名，不包含@符号">
                            </div>
                            <div class="form-group">
                                <label for="username-reason">原因:</label>
                                <textarea id="username-reason" name="reason" placeholder="添加黑名单的原因（可选）"></textarea>
                            </div>
                            <button type="submit" class="btn-success">添加用户名到黑名单</button>
                        </form>
                    </div>
                    
                    <div class="form-col">
                        <form id="userid-form">
                            <div class="form-group">
                                <label for="userid">用户ID:</label>
                                <input type="number" id="userid" name="userid" placeholder="输入用户ID">
                            </div>
                            <div class="form-group">
                                <label for="userid-reason">原因:</label>
                                <textarea id="userid-reason" name="reason" placeholder="添加黑名单的原因（可选）"></textarea>
                            </div>
                            <button type="submit" class="btn-success">添加用户ID到黑名单</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h3 class="section-title">黑名单列表</h3>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索用户名或ID...">
                </div>
                
                <h4>黑名单</h4>
                <table class="blacklist-table">
                    <thead>
                        <tr>
                            <th>类型</th>
                            <th>用户名/用户ID</th>
                            <th>添加者</th>
                            <th>添加时间</th>
                            <th>原因</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="blacklist-body">
                        <!-- 数据将通过JavaScript动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>

        <footer>
            <p>Koipy 回调管理黑名单 &copy; 2025</p>
        </footer>
    </div>

    <script>
        // DOM加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 检查认证状态
            checkAuth();
            
            // 添加页面加载完成后的其他初始化
            if (window.location.pathname === '/') {
                // 登录页面的特殊初始化
            } else {
                // 其他页面的初始化
            }
            
            // 登出按钮事件
            document.getElementById('logout-btn').addEventListener('click', function() {
                logout();
            });
            
            // 表单提交事件
            document.getElementById('username-form').addEventListener('submit', function(e) {
                e.preventDefault();
                addToBlacklist('username');
            });
            
            document.getElementById('userid-form').addEventListener('submit', function(e) {
                e.preventDefault();
                addToBlacklist('userid');
            });
            
            // 搜索功能
            document.getElementById('search-input').addEventListener('input', function() {
                loadBlacklist();
            });
            
            // 初始加载黑名单数据
            loadBlacklist();
        });
        
        // 检查认证状态
        function checkAuth() {
            // 如果已经在登录页面则不检查
            if (window.location.pathname === '/') {
                return;
            }
            
            // 显示加载中提示
            const notification = document.getElementById('notification');
            showNotification('正在验证登录状态...', 'success');
            
            // 检查认证状态
            fetch('/api/auth/check', {
                method: 'GET',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    // 如果未认证，跳转到登录页面
                    if (response.status === 401) {
                        showNotification('请先登录', 'error');
                        window.location.href = '/';
                        return;
                    }
                    throw new Error('认证检查失败');
                }
                return response.json();
            })
            .then(data => {
                if (data.authenticated) {
                    // 认证成功，继续页面加载
                    if (notification.style.display === 'block') {
                        // 如果显示了加载提示，则稍后隐藏
                        setTimeout(() => {
                            notification.style.display = 'none';
                        }, 2000);
                    }
                } else {
                    // 如果未认证，跳转到登录页面
                    showNotification('请先登录', 'error');
                    window.location.href = '/';
                }
            })
            .catch(error => {
                console.error('认证检查失败:', error);
                showNotification('网络错误，请重新登录', 'error');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            });
        }
        
        // 登出
        function logout() {
            fetch('/api/logout', {
                method: 'POST',
                credentials: 'include'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 修改为新的登录页面路径
                    window.location.href = '/';
                } else {
                    showNotification('登出失败', 'error');
                }
            })
            .catch(error => {
                console.error('登出失败:', error);
                showNotification('登出失败: ' + error.message, 'error');
            });
        }

        // 添加到黑名单
        function addToBlacklist(type) {
            const formData = new FormData(document.getElementById(type + '-form'));
            const data = {};

            formData.forEach((value, key) => {
                data[key] = value;
            });

            fetch('/api/blacklist/' + type, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data),
                credentials: 'include'
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showNotification('成功添加到黑名单', 'success');
                    document.getElementById(type + '-form').reset();
                    loadBlacklist();
                } else {
                    showNotification('添加失败: ' + result.error, 'error');
                }
            })
            .catch(error => {
                showNotification('添加失败: ' + error.message, 'error');
            });
        }

        // 从黑名单移除
        function removeFromBlacklist(button) {
            // 从按钮的data属性中获取数据
            const type = button.getAttribute('data-type');
            const value = button.getAttribute('data-value');
            
            if (!confirm('确定要从黑名单中移除吗？')) {
                return;
            }

            // 根据类型确定API路径
            const endpoint = '/api/blacklist/' + type + '/' + encodeURIComponent(value);
            
            fetch(endpoint, {
                method: 'DELETE',
                credentials: 'include'
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showNotification('成功从黑名单移除', 'success');
                    loadBlacklist();
                } else {
                    showNotification('移除失败: ' + result.error, 'error');
                }
            })
            .catch(error => {
                showNotification('移除失败: ' + error.message, 'error');
            });
        }

        // 加载黑名单数据
        function loadBlacklist() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            // 获取用户名和用户ID黑名单
            Promise.all([
                fetch('/api/blacklist/username', {credentials: 'include'}).then(response => response.json()),
                fetch('/api/blacklist/userid', {credentials: 'include'}).then(response => response.json())
            ])
            .then(([usernameData, useridData]) => {
                const tbody = document.getElementById('blacklist-body');
                tbody.innerHTML = '';
                
                // 合并数据
                let allData = [];
                
                // 处理用户名数据
                usernameData.forEach(item => {
                    allData.push({
                        type: '用户名',
                        value: item.username,
                        displayValue: '@' + item.username,
                        added_by: item.added_by || '系统',
                        added_at: item.added_at,
                        reason: item.reason || '无'
                    });
                });
                
                // 处理用户ID数据
                useridData.forEach(item => {
                    allData.push({
                        type: '用户ID',
                        value: item.userid,
                        displayValue: item.userid,
                        added_by: item.added_by || '系统',
                        added_at: item.added_at,
                        reason: item.reason || '无'
                    });
                });
                
                // 根据搜索词过滤数据
                allData = allData.filter(item =>
                    !searchTerm ||
                    item.value.toString().toLowerCase().includes(searchTerm)
                );
                
                // 按添加时间排序（最新的在前）
                allData.sort((a, b) => new Date(b.added_at) - new Date(a.added_at));
                
                // 显示数据
                allData.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.type}</td>
                        <td>${item.displayValue}</td>
                        <td>${item.added_by}</td>
                        <td>${item.added_at}</td>
                        <td>${item.reason}</td>
                        <td class="action-buttons">
                            <button class="btn-danger" data-type="${item.type === '用户名' ? 'username' : 'userid'}" data-value="${item.value}" onclick="removeFromBlacklist(this)">移除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                console.error('加载黑名单失败:', error);
                showNotification('加载黑名单失败: ' + error.message, 'error');
            });
        }
        
        // 显示通知
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification ' + type;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
